apiVersion: apps/v1
kind: Deployment
metadata:
  name: adis-backend
  labels:
    app: adis-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: adis-backend
  template:
    metadata:
      labels:
        app: adis-backend
    spec:
      containers:
      - name: adis-backend
        image: adis-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: MONGO_URL
          value: "mongodb://adis-mongo:27017"
        - name: DB_NAME
          value: "adis_database"
        - name: CORS_ORIGINS
          value: "*"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: adis-backend
spec:
  selector:
    app: adis-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
